<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" role="img" aria-labelledby="title desc">
  <title id="title">Orbital Labs example teams</title>
  <desc id="desc">A diagram showing Orbital Labs with an Infrastructure team led by Zara Osei and Five, and a Development team led by Maya Chen with Rex Park and Jordan Reyes.</desc>
  <style>
    .label { font: 700 20px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .text { font: 500 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
    .small { font: 500 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .card { fill: #ffffff; stroke: #d1d5db; stroke-width: 2; rx: 16; }
    .org { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; }
    .infra { fill: #dbeafe; stroke: #3b82f6; stroke-width: 2; }
    .dev { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; }
    .person { fill: #f9fafb; stroke: #9ca3af; stroke-width: 1.5; }
    .line { stroke: #9ca3af; stroke-width: 2.5; }
  </style>

  <rect x="20" y="20" width="820" height="380" rx="24" fill="#f8fafc" stroke="#e5e7eb" />

  <rect class="org" x="290" y="40" width="280" height="72" rx="18"/>
  <text class="label" x="430" y="70" text-anchor="middle">Orbital Labs</text>
  <text class="small" x="430" y="94" text-anchor="middle">Example organization used in Layer5 Cloud docs</text>

  <line class="line" x1="430" y1="112" x2="430" y2="146"/>
  <line class="line" x1="220" y1="146" x2="640" y2="146"/>
  <line class="line" x1="220" y1="146" x2="220" y2="170"/>
  <line class="line" x1="640" y1="146" x2="640" y2="170"/>

  <rect class="infra" x="70" y="170" width="300" height="190" rx="20"/>
  <text class="label" x="220" y="204" text-anchor="middle">Infrastructure team</text>
  <text class="small" x="220" y="228" text-anchor="middle">Primary example</text>
  <rect class="person" x="100" y="250" width="240" height="40" rx="12"/>
  <text class="text" x="120" y="276">Admin: Zara Osei</text>
  <rect class="person" x="100" y="304" width="240" height="40" rx="12"/>
  <text class="text" x="120" y="330">Member: Five</text>

  <rect class="dev" x="490" y="170" width="300" height="190" rx="20"/>
  <text class="label" x="640" y="204" text-anchor="middle">Development team</text>
  <text class="small" x="640" y="228" text-anchor="middle">Second example</text>
  <rect class="person" x="520" y="250" width="240" height="40" rx="12"/>
  <text class="text" x="540" y="276">Admin: Maya Chen</text>
  <rect class="person" x="520" y="304" width="240" height="40" rx="12"/>
  <text class="text" x="540" y="330">Members: Rex Park, Jordan Reyes</text>
</svg>
