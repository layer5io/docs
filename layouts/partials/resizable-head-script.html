<script>
(function () {
  try {
    var rootCss = "";
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (k.indexOf("resizable:") !== 0) continue;
      var key = k.slice("resizable:".length);
      var w = parseFloat(localStorage.getItem(k));
      if (isNaN(w)) continue;
      rootCss += ':root{--resizable-w-' + key + ':' + w + 'px}';
    }
    if (rootCss) {
      var s = document.createElement("style");
      s.textContent = rootCss;
      document.head.appendChild(s);
    }
  } catch (e) {}
})();
</script>
