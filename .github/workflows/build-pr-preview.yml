name: Build PR Preview

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: build-preview-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      HUGO_VERSION: 0.158.0

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
          fetch-depth: 0

      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Dart Sass (npm)
        run: |
          npm i -g sass
          sass --version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [[ -f package-lock.json || -f npm-shrinkwrap.json ]]; then
            npm ci
          fi

      - name: Build PR preview
        env:
          BASE_URL: /pr-preview/pr-${{ github.event.pull_request.number }}/
          HUGO_PREVIEW: 'true'
        run: |
          npm run build:preview
          cat > public/robots.txt <<'EOF'
          User-agent: *
          Disallow: /
          EOF
          echo "${{ github.event.pull_request.number }}" > public/PR_NUMBER.txt

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-preview-site
          path: public/
          retention-days: 1
