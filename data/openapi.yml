  /api/identity/users/self:
    delete:
      x-internal:
        - cloud
      tags:
        - User_users
      operationId: deleteUserAccount
      summary: Delete the caller's own account
      description: >-
        Soft-deletes the caller's Layer5 Cloud user record and hard-deletes the backing identity. When
        deleteOrganization is true, the caller's organization is hard-deleted in the same operation, subject to
        server-side re-validation: the organization must not be the shared Layer5 provider organization, must not have
        an active paid subscription, and organizationNameConfirmation must match the stored organization name. When the
        organization shares resources into other surviving organizations, confirmSharedResourceDestruction must also be
        true. Inputs are passed as query parameters because DELETE request bodies are unreliable across the extension
        proxy and intermediate HTTP clients.
      parameters:
        - name: deleteOrganization
          in: query
          required: false
          description: >-
            When true, hard-delete the caller's organization along with the account. Defaults to false (delete only the
            account).
          schema:
            type: boolean
        - name: organizationId
          in: query
          required: false
          description: Identifier of the organization to hard-delete. Required by the server when deleteOrganization is true.
          schema:
            type: string
            format: uuid
            description: >-
              A Universally Unique Identifier used to uniquely identify entities in Meshery. The UUID core definition is
              used across different schemas.
            x-go-type: uuid.UUID
            x-go-type-import:
              path: github.com/gofrs/uuid
        - name: organizationNameConfirmation
          in: query
          required: false
          description: >-
            User-typed organization name. The server re-validates this against the stored organization name when
            deleteOrganization is true and rejects the request on mismatch.
          schema:
            type: string
        - name: confirmSharedResourceDestruction
          in: query
          required: false
          description: >-
            Explicit acknowledgement that resources shared into other surviving organizations will be destroyed.
            Required by the server when the organization's crossTenantSharedResourceCount is greater than zero.
          schema:
            type: boolean
      responses:
        '204':
          description: Account (and organization, when requested) deleted
        '400':
          description: Invalid request body or request param
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Expired JWT token used or insufficient privilege
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: Result not found
          content:
            text/plain:
              schema:
                type: string
        '409':
          description: >-
            Deletion preconditions were not met. Returned when the target organization is the shared Layer5 provider
            organization, has an active paid subscription, the caller is not its sole active member, the typed
            organizationNameConfirmation did not match, or destruction of shared resources was required but not
            confirmed.
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
