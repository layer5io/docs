                    description: URL to the badge image.
                    example: >-
                      https://raw.githubusercontent.com/meshery-extensions/meshery-academy/refs/heads/master/.github/assets/images/mershery-icon.png
                    maxLength: 2048
                    x-oapi-codegen-extra-tags:
                      db: image_url
                      json: imageUrl
                  createdAt:
                    type: string
                    format: date-time
                    description: Timestamp when the badge was created.
                    x-go-type: time.Time
                    x-go-type-skip-optional-pointer: true
                    x-oapi-codegen-extra-tags:
                      db: created_at
                      json: createdAt
                  updatedAt:
                    type: string
                    format: date-time
                    description: Timestamp when the badge was last updated.
                    x-go-type: time.Time
                    x-go-type-skip-optional-pointer: true
                    x-oapi-codegen-extra-tags:
                      db: updated_at
                      json: updatedAt
                  deletedAt:
                    type: string
                    format: date-time
                    description: Timestamp when the badge was soft-deleted, if applicable.
                    x-go-type: core.NullTime
                    x-go-type-import:
                      path: github.com/meshery/schemas/models/core
                      name: core
                    x-oapi-codegen-extra-tags:
                      db: deleted_at
                      json: deletedAt
        '401':
          description: Expired JWT token used or insufficient privilege
          content:
            text/plain:
              schema:
