  /api/integrations/support:
    post:
      x-internal:
        - cloud
      tags:
        - Support_Support
      summary: Submit a support request
      operationId: submitSupportRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Payload for submitting a help-and-support request.
              required:
                - subject
                - message
              properties:
                subject:
                  type: string
                  title: Subject
                  minLength: 1
                  maxLength: 255
                  description: Concise and descriptive title for the support request.
                message:
                  type: string
                  title: Description
                  minLength: 10
                  description: Detailed description of the issue or question.
                scope:
                  type: string
                  title: Scope
                  enum:
                    - Support
                    - Community
                    - Account
                    - Commercial
                  description: Category that best represents the nature of the inquiry.
      responses:
        '201':
          description: Support request submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Invalid request format
        '401':
          description: Expired JWT token used or insufficient privilege
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal server error
  /api/system/version:
    get:
      x-internal:
        - cloud
        - meshery
      tags:
        - System_API_System
      summary: Get the running Meshery server's version metadata
      description: Returns version metadata for the running Meshery service.
      operationId: getSystemVersion
      security: []
      responses:
        '200':
          description: Server version metadata
          content:
            application/json:
              schema:
                type: object
                description: Version metadata for a running Meshery service.
                additionalProperties: false
                properties:
                  version:
                    type: string
                    description: Meshery Cloud deployment version.
                    maxLength: 128
                  build:
                    type: string
                    description: Build identifier (typically the git tag of the running binary).
                    maxLength: 128
                  latest:
                    type: string
                    description: Latest available Meshery release tag fetched from GitHub.
                    maxLength: 128
                  outdated:
                    type: boolean
                    description: True when the running build is older than the latest available release.
                  commitsha:
                    type: string
                    description: Git commit SHA of the running service. The wire field is `commitsha`.
                    maxLength: 64
                  releaseChannel:
                    type: string
                    description: Release channel of the running binary (e.g. `stable`, `edge`).
                    maxLength: 64
        '500':
          description: Encoding error while serializing the version payload.
  /api/system/email/test:
    post:
      x-internal:
        - cloud
      tags:
        - System_API_System
      summary: Send a test email
      description: >-
        Sends a test email through the configured SMTP provider to verify the email configuration. Restricted to
        provider administrators.
      operationId: sendTestEmail
      requestBody:
        description: Recipient and optional subject for the test email.
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Request body for sending a test email through the configured SMTP provider.
              additionalProperties: false
              required:
                - to
              properties:
                to:
                  type: string
                  description: Recipient email address for the test message.
                  format: email
                  maxLength: 320
                subject:
                  type: string
                  description: Subject line for the test message. A default subject is used when omitted.
                  maxLength: 998
                  x-oapi-codegen-extra-tags:
                    json: subject,omitempty
      responses:
        '200':
          description: Test email sent
          content:
            application/json:
              schema:
                type: object
                description: Result of a test email send attempt.
                additionalProperties: false
                required:
                  - status
                  - message
                  - timestamp
                  - sentTo
                properties:
                  status:
                    type: string
                    description: Outcome status of the send attempt (e.g. `success`).
                    maxLength: 64
                  message:
                    type: string
                    description: Human-readable result message.
                    maxLength: 1024
                  timestamp:
                    type: string
                    description: Unix-epoch seconds, as a decimal string, when the test email was sent.
                    pattern: ^[0-9]+$
                    maxLength: 20
                  sentTo:
                    type: string
                    description: Recipient address the test email was sent to.
                    format: email
                    maxLength: 320
        '400':
          description: Invalid request payload or malformed recipient email address.
        '401':
          description: Expired JWT token used or insufficient privilege
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Email configuration validation failed or the send attempt errored.
  /api/organizations/badges/{badgeId}:
    delete:
      x-internal:
        - cloud
      operationId: deleteBadgeById
      tags:
        - Badge_Badge
      summary: Delete a badge by its ID
      parameters:
        - name: badgeId
          in: path
          description: Badge ID
          required: true
          schema:
            type: string
            format: uuid
            description: >-
              A Universally Unique Identifier used to uniquely identify entities in Meshery. The UUID core definition is
              used across different schemas.
            x-go-type: uuid.UUID
            x-go-type-import:
              path: github.com/gofrs/uuid
      responses:
        '204':
          description: Badge deleted
        '401':
          description: Expired JWT token used or insufficient privilege
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: Result not found
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
    get:
      x-internal:
        - cloud
      operationId: getBadgeById
      tags:
        - Badge_Badge
      summary: Get a badge by its ID
      parameters:
        - name: badgeId
          in: path
          description: Badge ID
          required: true
          schema:
            type: string
            format: uuid
            description: >-
              A Universally Unique Identifier used to uniquely identify entities in Meshery. The UUID core definition is
              used across different schemas.
            x-go-type: uuid.UUID
            x-go-type-import:
              path: github.com/gofrs/uuid
      responses:
        '200':
          description: Badge response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                description: Badge entity — a named recognition issued within an organization.
                required:
                  - id
                  - label
                  - name
                  - orgId
                  - description
                  - imageUrl
                  - createdAt
                  - updatedAt
                  - deletedAt
                properties:
                  id:
                    type: string
                    format: uuid
                    description: >-
                      A Universally Unique Identifier used to uniquely identify entities in Meshery. The UUID core
