                        maxLength: 500
                        format: uuid
                      recipientName:
                        type: string
                        description: Name of the recipient (user) who received the certificate
                        example: John Doe
                        maxLength: 500
                      title:
                        type: string
                        description: Title of the certificate
                        example: Kubernetes Expert Certification
                        maxLength: 500
                      description:
                        type: string
                        description: Description of the certificate
