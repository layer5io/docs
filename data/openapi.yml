        '200':
          description: Connection definition updated
          content:
            application/json:
              schema:
                description: >-
                  A connection definition is an uninitialized connection, authored per-model (in a model's
                  `connections/` folder) and registered into the registry alongside components and relationships. It
                  conforms to the connection schema; the dynamic, kind-specific shape is carried in `metadata`. The
                  `model` association scopes the definition to its owning model.
                x-go-type: ConnectionDefinition
        '400':
          description: Invalid request body or request param
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Expired JWT token used or insufficient privilege
          content:
            text/plain:
              schema:
                type: string
