      parameters:
        - name: page
          in: query
          description: Get responses by page
          schema:
            type: integer
            minimum: 0
        - name: pageSize
          in: query
          description: Number of items per page (canonical camelCase form).
          schema:
            type: integer
            minimum: 1
        - name: search
          in: query
          description: Get responses that match search param value
          schema:
            type: string
        - name: order
          in: query
          description: Get ordered responses
          schema:
            type: string
