  /api/academy/registrations/test-sessions/submit:
    post:
      tags:
        - Academy_API_Academy
      x-internal:
        - cloud
      operationId: submitQuiz
      summary: Submit a quiz for evaluation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - quizAbsPath
                - registrationId
                - testSessionId
                - userId
                - answers
              properties:
                testSessionId:
                  type: string
                  format: uuid
                  description: >-
                    A Universally Unique Identifier used to uniquely identify entities in Meshery. The UUID core
                    definition is used across different schemas.
                  x-go-type: uuid.UUID
                  x-go-type-import:
                    path: github.com/gofrs/uuid
                quizAbsPath:
                  type: string
                  description: The quiz abs path of the quizsubmission.
                  maxLength: 500
                registrationId:
                  type: string
                  description: ID of the associated registration.
                  maxLength: 500
                  format: uuid
                userId:
                  type: string
                  description: ID of the user who owns or created this resource.
                  maxLength: 500
                  format: uuid
                answers:
                  type: array
                  items:
                    x-go-type: SubmittedAnswer
                    type: object
                    required:
                      - questionId
                      - selectedOptionId
                      - answerText
                    properties:
                      questionId:
                        type: string
                        description: ID of the associated question.
                        maxLength: 500
                        format: uuid
                      selectedOptionId:
                        type: object
                        additionalProperties:
                          type: boolean
                        description: Map of selected option IDs to a boolean value indicating if it was selected.
