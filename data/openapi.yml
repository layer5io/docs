  /api/identity/users/self/account-deletion-eligibility:
    get:
      x-internal:
        - cloud
      tags:
        - User_users
      operationId: getAccountDeletionEligibility
      summary: Get account deletion eligibility
      description: >-
        Pre-check evaluated before an account self-deletion is confirmed. Reports whether deleting the caller's account
        would also require or permit hard-deleting their organization, whether that organization is the shared Layer5
        provider organization or carries an active paid subscription, how many of its resources are also shared into
        other surviving organizations, and the per-resource blast radius of the deletion.
      parameters:
        - name: organizationId
          in: query
          required: false
          description: >-
            Organization to evaluate for deletion alongside the account. When omitted, the caller's currently selected
            organization is evaluated.
          schema:
            type: string
            format: uuid
            description: >-
              A Universally Unique Identifier used to uniquely identify entities in Meshery. The UUID core definition is
              used across different schemas.
            x-go-type: uuid.UUID
            x-go-type-import:
              path: github.com/gofrs/uuid
      responses:
        '200':
          description: Account deletion eligibility for the caller
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                description: >-
                  Pre-check result returned before an account self-deletion is confirmed. Describes whether deleting the
                  caller's account would also require or permit hard-deleting their organization and quantifies the
                  blast radius. All fields are always present so the client can render the confirmation state
                  deterministically.
                required:
                  - isSoleActiveMember
                  - organizationId
                  - organizationName
                  - isProviderOrg
                  - hasActivePaidSubscription
                  - crossTenantSharedResourceCount
                  - impact
                properties:
                  isSoleActiveMember:
                    type: boolean
                    description: >-
                      True when the caller is the only active member of the organization, so deleting their account
                      would leave the organization without any active members.
                  organizationId:
                    type: string
                    format: uuid
                    description: >-
                      A Universally Unique Identifier used to uniquely identify entities in Meshery. The UUID core
                      definition is used across different schemas.
                    x-go-type: uuid.UUID
                    x-go-type-import:
                      path: github.com/gofrs/uuid
                  organizationName:
                    type: string
                    maxLength: 255
                    description: >-
                      Human-readable name of the organization evaluated for deletion. The client echoes this value back
                      as organizationNameConfirmation when requesting deletion.
                  isProviderOrg:
                    type: boolean
                    description: >-
                      True when this is the shared Layer5 provider organization, which is never deletable regardless of
                      membership.
                  hasActivePaidSubscription:
