                    x-go-type: uuid.UUID
                    x-go-type-import:
                      path: github.com/gofrs/uuid
                    x-go-name: ID
                    x-oapi-codegen-extra-tags:
                      db: id
                      json: id
                  orgId:
                    type: string
                    format: uuid
                    description: >-
                      A Universally Unique Identifier used to uniquely identify entities in Meshery. The UUID core
                      definition is used across different schemas.
                    x-go-type: uuid.UUID
                    x-go-type-import:
                      path: github.com/gofrs/uuid
                    x-go-name: OrgID
                    x-oapi-codegen-extra-tags:
                      db: org_id
                      json: orgId
                  label:
                    type: string
                    description: Unique identifier for the badge, typically slug-style (auto generated).
                    example: Kubernetes-Expert
                    x-oapi-codegen-extra-tags:
                      db: label
                      json: label
                    maxLength: 500
                  name:
                    type: string
                    description: Concise descriptor for the badge or certificate.
                    example: Kubernetes Expert
                    x-oapi-codegen-extra-tags:
                      db: name
                      json: name
                    minLength: 1
                    maxLength: 255
                  description:
                    type: string
                    description: A description of the milestone achieved, often including criteria for receiving this recognition.
                    example: Awarded for mastering Kubernetes concepts and practices.
                    x-oapi-codegen-extra-tags:
                      db: description
                      json: description
                    maxLength: 5000
                  imageUrl:
                    type: string
