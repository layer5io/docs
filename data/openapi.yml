        event categories are filtered out and email addresses are redacted unless the caller is a provider admin or is
        viewing their own profile. Pagination beyond the first page requires provider-admin privileges.
      security: []
      parameters:
        - name: userId
          in: path
          required: true
          description: ID of the user
          schema:
            type: string
            format: uuid
            description: >-
              A Universally Unique Identifier used to uniquely identify entities in Meshery. The UUID core definition is
              used across different schemas.
            x-go-type: uuid.UUID
            x-go-type-import:
              path: github.com/gofrs/uuid
        - name: page
          in: query
          description: Zero-based page index of the activity feed.
          schema:
            type: integer
            minimum: 0
        - name: pageSize
          in: query
          description: Number of activity entries per page.
          schema:
            type: integer
            minimum: 1
        - name: pagesize
          in: query
          deprecated: true
          description: >-
            Deprecated lowercase alias of pageSize, kept while existing clients migrate to the canonical camelCase
            parameter.
          schema:
            type: integer
            minimum: 1
        - name: order
          in: query
          description: Get ordered responses
          schema:
            type: string
        - name: filter
          in: query
          description: Get filtered reponses
          schema:
            type: string
      responses:
        '200':
          description: Recent-activity page for the requested user
          content:
            application/json:
              schema:
                type: object
                description: Paginated recent-activity feed for a user's public profile.
                properties:
                  page:
                    type: integer
                    description: Current page number of the result set.
                    minimum: 0
                  pageSize:
