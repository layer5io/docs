openapi: 3.0.0
info:
  title: Meshery Cloud
  description: Documentation for Meshery Cloud REST APIs.
  version: v1.3.34
  contact:
    name: Meshery Maintainers
    email: maintainers@meshery.io
    url: https://meshery.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: https://cloud.meshery.io
    description: Meshery Cloud production server URL
  - url: https://staging-cloud.meshery.io
    description: Meshery Cloud staging server URL
  - url: http://localhost:9876
    description: Meshery Cloud development server URL (controlled via PORT environment variable)
tags:
  - name: Meshery_Controllers_Configuration_controllers
    description: APIs for configuring Meshery Operator, MeshSync, and Meshery Broker.
  - name: Evaluation_Evaluation
    description: Operations related to design evaluation
  - name: Feature_Features
    description: Operations related to features and entitlements
  - name: Registry_Registry
    description: Operations on Meshery's capabilities registry.
  - name: Support_Support
    description: Operations related to help and support requests
  - name: System_API_System
    description: Operational endpoints for Meshery Server.
  - name: Badge_Badge
    description: Operations related to user and organization badges.
  - name: credential_credentials
    description: Operations related to integration credentials
  - name: Key_Key
    description: Operations related to authorization keys
  - name: Key_users
    description: Operations related to users and their authorization keys
  - name: Keychain_Keychain
    description: Operations related to keychains
  - name: Model_Models
    description: Operations related to mesh models
  - name: Organization_Organizations
    description: Operations related to organization management
  - name: role_roles
    description: Operations related to roles and role assignments
  - name: schedule_scheduler
    description: Operations related to scheduled tasks
  - name: Team_teams
    description: >-
      A Team is a group of one or more users. Teams are used for assigning permissions in organizations and workspaces.
      Learn more at https://docs.meshery.io/concepts/logical/teams
  - name: User_users
    description: Operations related to users
  - name: View_views
    description: APIs for managing Meshery views.
  - name: Academy_API_Academy
    description: Operations related to Meshery Academy content and curriculum
  - name: Design_designs
    description: Operations related to designs and infrastructure patterns
  - name: Environment_environments
    description: APIs for environments
  - name: Events_events
    description: APIs for Meshery Cloud events.
  - name: Filter_filters
    description: Operations related to Meshery filters.
  - name: Invitation_Invitation
    description: Operations related to invitation
  - name: PatternResource_patternResources
    description: Operations related to Meshery pattern resources.
  - name: Performance_Profile_performance
    description: APIs for managing Meshery performance profiles.
  - name: Plan_Plans
    description: Operations related to plans
  - name: Subscription_Subscriptions
    description: Operations related to subscriptions
  - name: Subscription_Plans
    description: Operations related to plans
  - name: Subscription_Payment Processors
    description: Operations related to payment processors
  - name: token_tokens
    description: Operations related to user tokens and sessions
  - name: Workspace_workspaces
    description: APIs for Meshery Cloud workspaces.
  - name: Workspace_views
    description: APIs for Meshery Cloud views associated with workspaces.
  - name: Workspace_designs
    description: APIs for Meshery Cloud designs associated with workspaces.
paths:
  /api/entitlement/features:
    get:
      x-internal:
        - cloud
      tags:
        - Feature_Features
      summary: Get all features defined across plans
      operationId: getFeatures
      parameters:
        - name: page
          in: query
          description: Get responses by page
          schema:
            type: string
        - name: pagesize
          in: query
          description: Get responses by pagesize
          schema:
            type: string
      responses:
        '200':
          description: Features response
          content:
            application/json:
              schema:
                type: array
                description: List of features.
                items:
                  x-go-type: Feature
                  type: object
                  additionalProperties: false
                  description: >-
                    A feature is a quantified entitlement granted to an organization through its subscription plan, such
                    as the number of components allowed in a design.
                  required:
                    - id
                    - plan_id
                    - name
                    - quantity
                    - created_at
                    - updated_at
                  properties:
                    id:
                      description: Unique identifier for the feature.
                      x-go-name: ID
                      x-oapi-codegen-extra-tags:
                        db: id
                        csv: id
                      x-order: 1
                      type: string
                      format: uuid
                      x-go-type: uuid.UUID
                      x-go-type-import:
                        path: github.com/gofrs/uuid
                    plan_id:
                      description: Identifier of the plan granting this feature.
                      x-go-name: PlanId
                      x-oapi-codegen-extra-tags:
                        db: plan_id
                        csv: plan_id
                      x-order: 2
                      type: string
                      format: uuid
                      x-go-type: uuid.UUID
                      x-go-type-import:
                        path: github.com/gofrs/uuid
                    plan:
                      description: The plan granting this feature. Populated only when the association is explicitly loaded.
                      x-go-type: planv1beta3.Plan
                      x-go-type-import:
                        path: github.com/meshery/schemas/models/v1beta3/plan
                        name: planv1beta3
                      x-oapi-codegen-extra-tags:
                        belongs_to: plans
                        fk_id: PlanId
                        json: plan,omitempty
                      x-order: 3
                      type: object
                      additionalProperties: false
                      required:
                        - id
                        - name
                        - cadence
                        - unit
                        - pricePerUnit
                        - minimumUnits
                        - currency
                      properties:
                        id:
                          description: Unique identifier for the plan.
                          x-oapi-codegen-extra-tags:
                            db: id
                            json: id
                            csv: id
                          type: string
                          format: uuid
                          x-go-type: uuid.UUID
                          x-go-type-import:
                            path: github.com/gofrs/uuid
                        name:
                          description: Display name of the plan.
                          x-go-type: PlanName
                          x-oapi-codegen-extra-tags:
                            db: name
                            json: name
                            csv: name
                          type: string
                          x-enum-casing-exempt: true
                          enum:
                            - Free
                            - Team Designer
                            - Team Operator
                            - Enterprise
                        cadence:
                          description: Billing cadence for the plan (monthly, annually, or none).
                          x-go-type: PlanCadence
                          x-oapi-codegen-extra-tags:
                            db: cadence
                            json: cadence
                            csv: cadence
                          type: string
                          enum:
                            - none
                            - monthly
                            - annually
                        unit:
                          description: Unit of consumption this plan charges against (e.g. user).
                          x-go-type: PlanUnit
                          x-oapi-codegen-extra-tags:
                            db: unit
                            json: unit
                            csv: unit
                          type: string
                          enum:
                            - user
                            - free
                        minimumUnits:
                          type: integer
                          description: Minimum number of units required for the plan.
                          x-oapi-codegen-extra-tags:
                            db: minimum_units
                            json: minimumUnits
                            csv: minimum_units
                          minimum: 0
                        pricePerUnit:
                          type: number
                          description: Price per unit of the plan.
                          x-oapi-codegen-extra-tags:
                            db: price_per_unit
                            json: pricePerUnit
                            csv: price_per_unit
                          minimum: 0
                        currency:
                          description: Currency in which the plan is priced.
                          x-go-type: Currency
                          x-oapi-codegen-extra-tags:
                            db: currency
                            json: currency
                            csv: currency
                          type: string
                          enum:
                            - usd
                    name:
                      description: Name of the entitled feature.
                      x-go-type: FeatureName
                      x-oapi-codegen-extra-tags:
                        db: name
                        csv: name
                      x-order: 4
                      type: string
                      x-enum-casing-exempt: true
                      enum:
                        - ComponentsInDesign
                        - RelationshipsInDesign
                        - DesignsInWorkspace
                        - WorkspacesInOrganization
                        - ImageSizeInDesign
                        - SizePerDesign
                    quantity:
                      type: number
                      format: double
                      description: Quantity of the feature granted by the plan. The sentinel value 999999999999 denotes unlimited.
                      minimum: 0
                      x-oapi-codegen-extra-tags:
                        db: quantity
                        csv: quantity
                      x-order: 5
                    created_at:
                      x-order: 6
                      description: Timestamp when the resource was created.
                      x-go-type: time.Time
                      type: string
                      format: date-time
                      x-go-name: CreatedAt
                      x-oapi-codegen-extra-tags:
                        db: created_at
                        yaml: created_at
                      x-go-type-skip-optional-pointer: true
                    updated_at:
                      x-order: 7
                      description: Timestamp when the resource was updated.
                      x-go-type: time.Time
                      type: string
                      format: date-time
                      x-go-name: UpdatedAt
                      x-oapi-codegen-extra-tags:
                        db: updated_at
                        yaml: updated_at
                      x-go-type-skip-optional-pointer: true
        '400':
          description: Invalid request body or request param
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Expired JWT token used or insufficient privilege
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
